version: "3.9"

networks:
  mon_net:
    driver: bridge

volumes:
  smokeping_data:
  prometheus_data:

services:
  smokeping:
    image: lscr.io/linuxserver/smokeping:latest
    container_name: smokeping
    environment:
      - PUID=1000            # ajusta según tu usuario
      - PGID=1000
      - TZ=America/Argentina/Buenos_Aires
    volumes:
      - ./smokeping/config:/config          # tus archivos de config
      - smokeping_data:/data                # RRDs persistentes
    ports:
      - "127.0.0.1:9080:80"                 # solo loopback; lo publicás por el reverse
    cap_add:
      - NET_RAW                               # permite ICMP
    restart: unless-stopped
    networks:
      - mon_net

  smokeping_prober:
    image: ghcr.io/superq/smokeping_prober:latest
    container_name: smokeping_prober
    command:
      - --config.file=/config/targets.yaml
      - --listen-address=:9374
      - --ping.binary-path=/bin/fping
      - --ping.interval=5s
      - --ping.timeout=1s
      - --privileged                                 # usa fping con privilegios dentro del contenedor
    cap_add:
      - NET_RAW
    volumes:
      - ./prober/targets.yaml:/config/targets.yaml:ro
    restart: unless-stopped
    networks:
      - mon_net

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=90d
      - --storage.tsdb.retention.size=20GB
      - --web.enable-lifecycle
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"               # opcional; si lo exponés también via reverse
    restart: unless-stopped
    networks:
      - mon_net